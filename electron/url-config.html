<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Change Live URL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #f8fafc;
    }
    p {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
    }
    input:focus { border-color: #3b82f6; }
    .row { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save   { background: #2563eb; color: #fff; }
    .btn-save:hover { background: #1d4ed8; }
    .btn-cancel { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-cancel:hover { background: #334155; }
    .current {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 14px;
      word-break: break-all;
    }
    .current span { color: #38bdf8; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Change Live URL</h2>
    <p>Enter the server URL for this installation. Saved on this PC.</p>
    <div class="current">Current: <span id="current-url">—</span></div>
    <input id="url-input" type="url" placeholder="https://yourshop.lumac.lk" />
    <div class="row">
      <button class="btn-save"   onclick="save()">Save &amp; Reload</button>
      <button class="btn-cancel" onclick="window.urlConfig.cancel()">Cancel</button>
    </div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const current = window.urlConfig.getCurrent();
      document.getElementById('current-url').textContent = current || '(none)';
      document.getElementById('url-input').value = current || '';
      document.getElementById('url-input').focus();
      document.getElementById('url-input').select();
    });

    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') save();
      if (e.key === 'Escape') window.urlConfig.cancel();
    });

    function save() {
      const val = document.getElementById('url-input').value.trim();
      if (!val) return;
      window.urlConfig.save(val);
    }
  </script>
</body>
</html>
