<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 420px;
    height: 260px;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    overflow: hidden;
    user-select: none;
    border-radius: 16px;
  }

  /* ── Logo mark ── */
  .logo-ring {
    width: 88px;
    height: 88px;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 18px;
    box-shadow: 0 0 0 6px rgba(14,165,233,0.12), 0 8px 32px rgba(14,165,233,0.3);
  }
  .logo-ring img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ── Brand name ── */
  .brand {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #f1f5f9;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand span { color: #38bdf8; }

  /* ── Sinhala subtitle ── */
  .sub {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 28px;
    letter-spacing: 0.3px;
  }

  /* ── Progress bar ── */
  .progress-track {
    width: 200px;
    height: 3px;
    background: #1e293b;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #0ea5e9, #2563eb);
    border-radius: 2px;
    animation: progress 3s ease-in-out infinite;
    transform-origin: left;
  }
  @keyframes progress {
    0%   { width: 0%;   opacity: 1; }
    70%  { width: 85%;  opacity: 1; }
    90%  { width: 95%;  opacity: 0.6; }
    100% { width: 100%; opacity: 0; }
  }

  /* ── Status text ── */
  .status {
    font-size: 11px;
    color: #475569;
    letter-spacing: 0.3px;
  }
  .dot {
    display: inline-block;
    animation: blink 1.4s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* ── Version ── */
  .version {
    position: absolute;
    bottom: 14px;
    right: 18px;
    font-size: 10px;
    color: #334155;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

  <div class="logo-ring">
    <img src="../public/lumac-load.jpeg" alt="Lumac Solutions" />
  </div>

  <div class="brand">Lumac <span>Solutions</span></div>
  <div class="sub">Point of Sale System</div>

  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>

  <div class="status">
    ආරම්භ වෙමින්<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>

  <div class="version">v1.0.0</div>

</body>
</html>
