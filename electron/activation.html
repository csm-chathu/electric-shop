<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activate Lumac POS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 48px;
      width: 440px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: #2563eb;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    p.sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }

    label { display: block; text-align: left; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }

    input {
      width: 100%;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 18px;
      letter-spacing: 3px;
      padding: 12px 16px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #2563eb; }
    input::placeholder { letter-spacing: 1px; color: #475569; font-size: 14px; }

    .mac-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 14px 0 24px;
      font-size: 11px;
      color: #475569;
    }

    .mac-row code {
      background: #0f172a;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 1px;
    }

    button {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) { background: #1d4ed8; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .error {
      margin-top: 14px;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      display: none;
    }

    .success {
      margin-top: 14px;
      background: #052e16;
      border: 1px solid #166534;
      color: #86efac;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔑</div>
    <h1 id="title">Activate Lumac POS</h1>
    <p class="sub" id="subtitle">Enter the license key provided by your supplier</p>

    <label for="key">License Key</label>
    <input id="key" type="text" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" autocomplete="off" spellcheck="false" />

    <div class="mac-row">
      Machine ID: <code id="mac-display">loading...</code>
    </div>

    <button id="btn" onclick="activate()">Activate</button>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
  </div>

  <script>
    // Format key input as XXXX-XXXX-XXXX-XXXX
    const keyInput = document.getElementById('key');
    keyInput.addEventListener('input', () => {
      let v = keyInput.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 16);
      keyInput.value = v.match(/.{1,4}/g)?.join('-') || v;
    });

    // Show expired notice if trial ended
    const params = new URLSearchParams(location.search);
    if (params.get('expired') === '1') {
      document.getElementById('title').textContent = '⏰ Trial Expired';
      document.getElementById('subtitle').textContent = 'Enter the new license key sent by your supplier.';
      document.getElementById('title').style.color = '#f87171';
    }

    // Load MAC address
    window.activationAPI.getMac().then(mac => {
      document.getElementById('mac-display').textContent = mac || 'unknown';
    });

    async function activate() {
      const key = keyInput.value.trim();
      if (key.length < 19) { showError('Please enter a complete license key.'); return; }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Activating...';
      hideMessages();

      const result = await window.activationAPI.activate(key);

      btn.disabled = false;
      btn.textContent = 'Activate';

      if (result.success) {
        const isTrial = result.type === 'trial';
        const msg = isTrial
          ? `✓ Trial activated for ${result.customer || 'your shop'} — ${result.daysRemaining} days remaining. Launching...`
          : `✓ Full license activated for ${result.customer || 'your shop'}. Launching...`;
        document.getElementById('success').style.display = 'block';
        document.getElementById('success').textContent = msg;
        setTimeout(() => window.activationAPI.done(), 2000);
      } else {
        const msgs = {
          invalid_key:  'Invalid license key. Please check and try again.',
          key_expired:  'This paid key has expired (valid today only). Contact your supplier for a new key.',
          bad_format:   'Invalid key format. Please check and try again.',
        };
        showError(msgs[result.error] || 'Activation failed. Please try again.');
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideMessages() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'none';
    }
  </script>
</body>
</html>
